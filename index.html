  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>The Island of Flames</title>

  <link rel="stylesheet" href="style.css">
</head>

<body id="bodyBackground">

<main class="screen">

  <section id="menu">
    <h1>🔥 The Island of Flames</h1>
    <h2>Season 1 — The Crystal Awakens</h2>

    <input id="playerName" placeholder="Enter your name">

    <button onclick="startGame()">▶ New Game</button>
  </section>


  <section id="game" class="hidden">

    <h2 id="welcome">Welcome to Flame Cay</h2>

    <div class="card" id="timeBox">
      <h3>📅 Day <span id="dayNumber">1</span></h3>

      <h3>
        <span id="timeIcon">☀️</span>
        <span id="timePeriod">Morning</span>
      </h3>
    </div>


    <div id="portraitBox" class="hidden">
      <img
        id="portraitImage"
        src=""

      >

      <div id="portrait">🌴</div>

      <h3 id="speakerName">Narrator</h3>

      <p id="speakerTitle">The Story Begins</p>
    </div>


    <div id="dialogueCard" class="card">
      <p id="story"></p>

      <button
        id="continueButton"
        onclick="nextDialogue()"
      >
        ▶ Continue
      </button>
    </div>


    <div id="choices" class="hidden"></div>


    <section id="walkingScreen" class="hidden">
      <div class="card">
        <h2 id="walkingTitle">🚶 Exploring Flame Cay</h2>

        <p id="walkingText">
          You follow the island path...
        </p>

        <button onclick="finishWalking()">
          Continue Walking ➜
        </button>
      </div>
    </section>


    <section id="islandMap" class="hidden">
      <div class="card">

        <h2>🗺️ Flame Cay Map</h2>

        <p id="mapTimeText">
          ☀️ Morning locations
        </p>

        <button onclick="startWalking('volcano')">
          🌋 Volcano Peak
        </button>

        <button onclick="startWalking('jungle')">
          🌿 Whispering Jungle
        </button>

        <button onclick="startWalking('shrine')">
          💎 Crystal Shrine
        </button>

        <button onclick="startWalking('beach')">
          🏖 Arrival Beach
        </button>

        <button onclick="startWalking('villa')">
          🏡 Main Villa
        </button>

        <button onclick="startWalking('gym')">
          💪 Gym
        </button>

        <button onclick="startWalking('kitchen')">
          🍳 Kitchen
        </button>

        <button onclick="startWalking('pool')">
          🏊 Infinity Pool
        </button>

        <button onclick="startWalking('firepit')">
          🔥 Fire Pit
        </button>

        <button onclick="startWalking('cove')">
          🌙 Moonlight Cove
        </button>

        <button onclick="advanceTime()">
          ⏰ Advance Time
        </button>

      </div>
    </section>


    <div
      class="card"
      id="relationshipBox"
    ></div>

  </section>

</main>

const locationNames = {

  jungle: "Whispering Jungle",

  kitchen: "Kitchen",
  pool: "Infinity Pool",
  firepit: "Fire Pit",
  cove: "Moonlight Cove"
};


function startGame(){

  const input =
    document.getElementById("playerName");

  if(input.value.trim() !== ""){
    playerName = input.value.trim();
  }

  document
    .getElementById("menu")
    .classList.add("hidden");

  document
    .getElementById("game")
    .classList.remove("hidden");

  document.getElementById("welcome").innerHTML =
    "Welcome to Flame Cay, " + playerName + "!";

  dialogueIndex = 0;

  currentLocation = "villa";
  pendingLocation = "";

  currentDay = 1;
  currentTime = "Morning";

  document.getElementById("continueButton").style.display =
    "block";

  document
    .getElementById("choices")
    .classList.add("hidden");

  document
    .getElementById("islandMap")
    .classList.add("hidden");

  document
    .getElementById("walkingScreen")
    .classList.add("hidden");

  showScene(introDialogue[0]);

  updateRelationships();
  updateTimeDisplay();

}


function nextDialogue(){

  dialogueIndex++;

  if(dialogueIndex < introDialogue.length){

    showScene(
      introDialogue[dialogueIndex]
    );

  }else{

    document.getElementById("continueButton").style.display =
      "none";

    openIslandMap();

  }

}


function showScene(scene){

  const character =
    characters[scene.speaker];

  changeBackground(
    scene.background
  );

  document
    .getElementById("dialogueCard")
    .classList.remove("hidden");

  const portraitBox =
    document.getElementById("portraitBox");

  portraitBox.classList.remove("hidden");

  portraitBox.style.animation = "none";
  portraitBox.offsetHeight;
  portraitBox.style.animation =
    "characterEnter .6s ease";

  document.getElementById("speakerName").innerHTML =
    character.name;

  document.getElementById("speakerTitle").innerHTML =
    character.title;

  const portraitImage =
    document.getElementById("portraitImage");

  const portraitEmoji =
    document.getElementById("portrait");

  if(character.image !== ""){

    portraitImage.src =
      character.image;

    portraitImage.style.display =
      "block";

    portraitEmoji.style.display =
      "none";

  }else{

    portraitImage.style.display =
      "none";

    portraitEmoji.style.display =
      "flex";

    portraitEmoji.innerHTML =
      character.emoji;

  }

  typeText(
    scene.text
  );

}


function changeBackground(scene){

  if(scene === "arrival"){
    document.body.style.background =
      "linear-gradient(180deg,#70d8ff,#08657e)";
  }

  if(scene === "villa"){
    document.body.style.background =
      "linear-gradient(180deg,#58c7e8,#0b718c)";
  }

  if(scene === "beach"){
    document.body.style.background =
      "linear-gradient(180deg,#7ee8ff,#167c99)";
  }

  if(scene === "crystal"){
    document.body.style.background =
      "linear-gradient(180deg,#1b335f,#061322)";
  }

  if(scene === "jungle"){
    document.body.style.background =
      "linear-gradient(180deg,#3d8b55,#153f2b)";
  }

  if(scene === "volcano"){
    document.body.style.background =
      "linear-gradient(180deg,#7f3b2f,#25100d)";
  }

  if(scene === "afternoon"){
    document.body.style.background =
      "linear-gradient(180deg,#ffbf69,#267b91)";
  }

  if(scene === "night"){
    document.body.style.background =
      "linear-gradient(180deg,#182650,#050812)";
  }

}


function typeText(text){

  const story =
    document.getElementById("story");

  if(typingTimer){
    clearTimeout(typingTimer);
  }

  story.innerHTML = "";

  let i = 0;

  function type(){

    if(i < text.length){

      const char =
        text.charAt(i);

      story.innerHTML +=
        char === "\n"
          ? "<br>"
          : char;

      i++;

      typingTimer =
        setTimeout(type, 30);

    }

  }

  type();

}


function openIslandMap(){

  document
    .getElementById("choices")
    .classList.add("hidden");

  document
    .getElementById("walkingScreen")
    .classList.add("hidden");

  document
    .getElementById("dialogueCard")
    .classList.add("hidden");

  document
    .getElementById("portraitBox")
    .classList.add("hidden");

  document
    .getElementById("islandMap")
    .classList.remove("hidden");

  document.getElementById("mapTimeText").innerHTML =
    getTimeIcon() +
    " Day " +
    currentDay +
    " — " +
    currentTime;

}


function advanceTime(){

  if(currentTime === "Morning"){

    currentTime = "Afternoon";

  }else if(currentTime === "Afternoon"){

    currentTime = "Evening";

  }else{

    currentDay++;
    currentTime = "Morning";

  }

  updateTimeDisplay();

  document
    .getElementById("islandMap")
    .classList.add("hidden");

  document
    .getElementById("choices")
    .classList.remove("hidden");

  document
    .getElementById("dialogueCard")
    .classList.remove("hidden");


  if(currentTime === "Morning"){

    showScene({
      speaker: "narrator",
      background: "arrival",
      text:
        "A new morning begins on Flame Cay.\n\n" +
        "The island wakes beneath the rising sun.\n\n" +
        "📅 Day " + currentDay +
        "\n☀️ Morning"
    });

  }


  if(currentTime === "Afternoon"){

    showScene({
      speaker: "narrator",
      background: "afternoon",
      text:
        "The morning slowly fades into afternoon.\n\n" +
        "The islanders begin moving to new locations.\n\n" +
        "📅 Day " + currentDay +
        "\n🌤️ Afternoon"
    });

  }


  if(currentTime === "Evening"){

    showScene({
      speaker: "narrator",
      background: "night",
      text:
        "The sun disappears beyond the ocean.\n\n" +
        "Lanterns glow across Flame Cay as evening begins.\n\n" +
        "📅 Day " + currentDay +
        "\n🌙 Evening"
    });

  }


  document.getElementById("choices").innerHTML = `
    <button onclick="openIslandMap()">
      🗺️ Return to Map
    </button>
  `;

}


function updateTimeDisplay(){

  document.getElementById("dayNumber").innerHTML =
    currentDay;

  document.getElementById("timePeriod").innerHTML =
    currentTime;

  document.getElementById("timeIcon").innerHTML =
    getTimeIcon();

}


function getTimeIcon(){

  if(currentTime === "Morning"){
    return "☀️";
  }

  if(currentTime === "Afternoon"){
    return "🌤️";
  }

  return "🌙";

}


function startWalking(location){

  pendingLocation = location;

  const destination =
    locationNames[location] || "your destination";

  document
    .getElementById("islandMap")
    .classList.add("hidden");

  document
    .getElementById("choices")
    .classList.add("hidden");

  document
    .getElementById("dialogueCard")
    .classList.add("hidden");

  document
    .getElementById("portraitBox")
    .classList.add("hidden");

  document
    .getElementById("walkingScreen")
    .classList.remove("hidden");

  document.getElementById("walkingTitle").innerHTML =
    "🚶 Walking to " + destination;

  document.getElementById("walkingText").innerHTML =
    getWalkingText(currentLocation, location);

}


function getWalkingText(from, to){

  if(from === "villa" && to === "beach"){

    return "You leave the villa and follow a stone path between the palms.<br><br>The sound of the ocean grows louder as Arrival Beach comes into view.";

  }

  if(from === "villa" && to === "shrine"){

    return "You leave the bright villa behind and follow Maya's trail into the jungle.<br><br>The air becomes cooler as the Crystal Shrine appears between the trees.";

  }

  if(from === "beach" && to === "villa"){

    return "You leave the shoreline and follow the sandy path uphill.<br><br>The Main Villa shines in the distance beneath the tropical sun.";

  }

  if(to === "jungle"){

    return "You follow a narrow trail beneath thick green leaves.<br><br>Soft whispers seem to move through the trees around you.";

  }

  if(to === "volcano"){

    return "You begin climbing the rocky path toward Volcano Peak.<br><br>Warm air rises from the ground beneath your feet.";

  }

  if(to === "firepit"){

    return "You follow glowing lanterns through the darkening villa grounds.<br><br>The Fire Pit burns brightly ahead.";

  }

  if(to === "cove"){

    return "You follow a quiet moonlit path beside the ocean.<br><br>Moonlight Cove appears beyond the palms.";

  }

  return "You leave " +
    (locationNames[from] || "your current location") +
    " and follow the island path toward " +
    (locationNames[to] || "your destination") +
    ".<br><br>The scenery slowly changes around you.";

}


function finishWalking(){

  document
    .getElementById("walkingScreen")
    .classList.add("hidden");

  if(pendingLocation !== ""){

    currentLocation = pendingLocation;

    visitLocation(
      pendingLocation
    );

    pendingLocation = "";

  }

}


function visitLocation(location){

  document
    .getElementById("islandMap")
    .classList.add("hidden");

  document
    .getElementById("dialogueCard")
    .classList.remove("hidden");

  document
    .getElementById("choices")
    .classList.remove("hidden");


  if(location === "beach"){
    visitBeach();
  }

  if(location === "villa"){
    visitVilla();
  }

  if(location === "shrine"){
    visitShrine();
  }

  if(location === "jungle"){
    visitJungle();
  }

  if(location === "gym"){
    visitGym();
  }

  if(location === "kitchen"){
    visitKitchen();
  }

  if(location === "pool"){
    visitPool();
  }

  if(location === "firepit"){
    visitFirePit();
  }

  if(location === "cove"){
    visitCove();
  }

  if(location === "volcano"){
    showComingSoon(
      "🌋 Volcano Peak",
      "The path farther up the volcano is currently locked.",
      "volcano"
    );
  }

}


function visitBeach(){

  if(currentTime === "Morning"){

    showScene({
      speaker: "narrator",
      background: "beach",
      text:
        "Morning sunlight shines across Arrival Beach.\n\n" +
        "Kai stands near the waves while Lisa relaxes in the sun."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkKaiBeach()">🌊 Talk to Kai</button>
      <button onclick="talkLisaBeach()">💖 Talk to Lisa</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;

    return;

  }


  if(currentTime === "Afternoon"){

    showScene({
      speaker: "narrator",
      background: "afternoon",
      text:
        "The afternoon sun glows over Arrival Beach.\n\n" +
        "Sofia is walking alone near the shoreline."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkSofiaBeach()">🌹 Talk to Sofia</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>

    return;

  }


  showEmptyLocation(
    "🏖 Arrival Beach",
    "The beach is quiet this evening. Everyone has gone to the Fire Pit.",
    "night"
  );

}

    showScene({

      background: "crystal",

      <button onclick="talkMayaShrine()">🌿 Talk to Maya</button>
