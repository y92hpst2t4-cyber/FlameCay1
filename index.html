<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Island of Flames</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="screen">

    <section id="menu">
      <h1>🔥 The Island of Flames</h1>
      <h2>Episode 1 — The Arrival</h2>

      <input id="playerName" placeholder="Enter your name">

      <button onclick="startGame()">▶ New Game</button>
    </section>

    <section id="game" style="display:none;">
      <h2 id="welcome">Welcome to Flame Cay</h2>

      <div class="card">
        <p id="story">
          The boat reaches the shore. A mysterious Crystal Flame glows in the distance.
        </p>
        <button id="continueButton" onclick="nextDialogue()">
    ▶ Continue
</button>

      </div>

      <button onclick="goToVilla()">🏠 Go to the Villa</button>
      <button onclick="exploreJungle()">🌴 Explore the Jungle</button>
      <button onclick="crystalFlame()">🔥 Investigate the Crystal Flame</button>

      <div class="card" id="relationshipBox">
        ❤️ Lucas: 0<br>
        ❤️ Maya: 0
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
