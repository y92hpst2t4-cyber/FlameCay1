<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Island of Flames</title>
  <link rel="stylesheet" href="style.css">
</head>

<body id="bodyBackground">
<main class="screen">

  <section id="menu">
    <h1>🔥 The Island of Flames</h1>
    <h2>Season 1 — The Crystal Awakens</h2>
    <input id="playerName" placeholder="Enter your name">
    <button onclick="startGame()">▶ New Game</button>
  </section>

  <section id="game" class="hidden">
    <h2 id="welcome">Welcome to Flame Cay</h2>

    <div id="portraitBox" class="hidden">
      <img id="portraitImage" src="" alt="Character Portrait">
      <div id="portrait">🌴</div>
      <h3 id="speakerName">Narrator</h3>
      <p id="speakerTitle">The Story Begins</p>
    </div>

    <div class="card">
      <p id="story"></p>
      <button id="continueButton" onclick="nextDialogue()">▶ Continue</button>
    </div>

    <div id="choices" class="hidden">
      <button onclick="goToVilla()">🏡 Enter the Villa</button>
      <button onclick="meetMaya()">🌿 Talk to Maya</button>
      <button onclick="crystalRoute()">🔥 Look toward the Crystal Flame</button>
    </div>

    <div class="card" id="relationshipBox"></div>
  </section>

</main>

<script>
let playerName = "Player";
let dialogueIndex = 0;
let typingTimer = null;

let relationships = {
  lucas: 0,
  maya: 0,
  kai: 0,
  isabella: 0
};

const characters = {
  narrator: {
    name: "Narrator",
    title: "The Story Begins",
    emoji: "🌴",
    image: ""
  },

  host: {
    name: "The Host",
    title: "Guardian of the Crystal Flame",
    emoji: "🎭",
    image: "images/F6AE1DF3-3320-4AD5-8141-6DD1929995FD.png"
  },

  lucas: {
    name: "Lucas Ramirez",
    title: "The Loyal Swimmer",
    emoji: "👦",
    image: "images/AF6CC476-58A0-42B0-8044-66A742190789.png"
  },

  kai: {
    name: "Kai Nakamura",
    title: "The Competitive Surfer",
    emoji: "🌊",
    image: "images/95C98E8C-8531-42AE-BAF7-DCB8A894E394.png"
  },

  isabella: {
    name: "Isabella Cruz",
    title: "The Social Butterfly",
    emoji: "🦋",
    image: "images/95F834E8-3ABC-4C2F-AF14-E8D121253968.png"
  },

  maya: {
    name: "Maya Patel",
    title: "The Explorer",
    emoji: "🌿",
    image: "images/0487E1B8-561B-4FDC-BAAE-EE223F61D754.png"
  }
};

const introDialogue = [
  { speaker:"narrator", background:"arrival", text:"🔥 THE ISLAND OF FLAMES\n\nSeason 1\nEpisode 1 — The Arrival" },
  { speaker:"narrator", background:"arrival", text:"The sun rises over the ocean.\n\nYour boat moves toward Flame Cay." },
  { speaker:"host", background:"arrival", text:"Welcome... to The Island of Flames.\n\nTwenty singles. One island. One unforgettable summer." },
  { speaker:"lucas", background:"villa", text:"Hey!\n\nI'm Lucas. Welcome to Flame Cay." },
  { speaker:"kai", background:"villa", text:"Kai flashes a confident smile.\n\n\"I'm Kai. I came here to win... and maybe fall in love along the way.\"" },
  { speaker:"isabella", background:"villa", text:"Isabella walks in with a bright smile.\n\n\"Hey! I'm Isabella. I came here for good vibes, great people... and maybe something real.\"" },
  { speaker:"maya", background:"villa", text:"I'm Maya.\n\nThere's something strange about this island..." },
  { speaker:"narrator", background:"crystal", text:"Deep inside the jungle...\n\nThe Crystal Flame begins to glow." },
  { speaker:"narrator", background:"villa", text:"Your first day begins now.\n\nWhere do you want to go first?" }
];

function startGame(){
  const input = document.getElementById("playerName");

  if(input.value.trim() !== ""){
    playerName = input.value.trim();
  }

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("welcome").innerHTML =
    "Welcome to Flame Cay, " + playerName + "!";

  dialogueIndex = 0;
  document.getElementById("continueButton").style.display = "block";
  document.getElementById("choices").classList.add("hidden");

  showScene(introDialogue[0]);
  updateRelationships();
}

function nextDialogue(){
  dialogueIndex++;

  if(dialogueIndex < introDialogue.length){
    showScene(introDialogue[dialogueIndex]);
  }else{
    document.getElementById("continueButton").style.display = "none";
    document.getElementById("choices").classList.remove("hidden");
  }
}

function showScene(scene){
  const character = characters[scene.speaker];

  changeBackground(scene.background);

  const portraitBox = document.getElementById("portraitBox");
  portraitBox.classList.remove("hidden");

  portraitBox.style.animation = "none";
  portraitBox.offsetHeight;
  portraitBox.style.animation = "characterEnter .6s ease";

  document.getElementById("speakerName").innerHTML = character.name;
  document.getElementById("speakerTitle").innerHTML = character.title;

  const portraitImage = document.getElementById("portraitImage");
  const portraitEmoji = document.getElementById("portrait");

  if(character.image !== ""){
    portraitImage.src = character.image;
    portraitImage.style.display = "block";
    portraitEmoji.style.display = "none";
  }else{
    portraitImage.style.display = "none";
    portraitEmoji.style.display = "flex";
    portraitEmoji.innerHTML = character.emoji;
  }

  typeText(scene.text);
}

function changeBackground(scene){
  if(scene === "arrival"){
    document.body.style.background = "linear-gradient(180deg,#70d8ff,#08657e)";
  }

  if(scene === "villa"){
    document.body.style.background = "linear-gradient(180deg,#58c7e8,#0b718c)";
  }

  if(scene === "crystal"){
    document.body.style.background = "linear-gradient(180deg,#1b335f,#061322)";
  }
}

function typeText(text){
  const story = document.getElementById("story");

  if(typingTimer){
    clearTimeout(typingTimer);
  }

  story.innerHTML = "";

  let i = 0;

  function type(){
    if(i < text.length){
      const char = text.charAt(i);
      story.innerHTML += char === "\n" ? "<br>" : char;
      i++;
      typingTimer = setTimeout(type, 30);
    }
  }

  type();
}

function goToVilla(){
  relationships.lucas++;

  showScene({
    speaker:"lucas",
    background:"villa",
    text:"Lucas walks beside you into the villa.\n\n\"This place is unreal,\" he says.\n\nYou notice him watching out for you."
  });

  updateRelationships();
}

function meetMaya(){
  relationships.maya++;

  showScene({
    speaker:"maya",
    background:"villa",
    text:"Maya studies strange markings on a stone wall.\n\n\"These symbols are older than the villa,\" she says."
  });

  updateRelationships();
}

function crystalRoute(){
  showScene({
    speaker:"narrator",
    background:"crystal",
    text:"You look toward the jungle.\n\nThe Crystal Flame glows brighter.\n\nA whisper crosses the wind:\n\n\"Keeper...\""
  });
}

function updateRelationships(){
  document.getElementById("relationshipBox").innerHTML =
    "❤️ Lucas: " + relationships.lucas +
    "<br>❤️ Maya: " + relationships.maya +
    "<br>❤️ Kai: " + relationships.kai +
    "<br>❤️ Isabella: " + relationships.isabella;
}
</script>

</body>
</html>
