<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Island of Flames</title>
  <link rel="stylesheet" href="style.css">
</head>

<body id="bodyBackground">
<main class="screen">

  <section id="menu">
    <h1>🔥 The Island of Flames</h1>
    <h2>Season 1 — The Crystal Awakens</h2>
    <input id="playerName" placeholder="Enter your name">
    <button onclick="startGame()">▶ New Game</button>
  </section>

  <section id="game" class="hidden">
    <h2 id="welcome">Welcome to Flame Cay</h2>

    <div class="card" id="timeBox">
      <h3>📅 Day <span id="dayNumber">1</span></h3>
      <h3>
        <span id="timeIcon">☀️</span>
        <span id="timePeriod">Morning</span>
      </h3>
      <p id="actionStatus">⭐ One activity available</p>
    </div>

    <div id="portraitBox" class="hidden">
      <img id="portraitImage" src="" alt="Character Portrait">
      <div id="portrait">🌴</div>
      <h3 id="speakerName">Narrator</h3>
      <p id="speakerTitle">The Story Begins</p>
    </div>

    <div id="dialogueCard" class="card">
      <p id="story"></p>
      <button id="continueButton" onclick="nextDialogue()">▶ Continue</button>
    </div>

    <div id="choices" class="hidden"></div>

    <section id="walkingScreen" class="hidden">
      <div class="card">
        <h2 id="walkingTitle">🚶 Exploring Flame Cay</h2>
        <p id="walkingText">You follow the island path...</p>
        <button onclick="finishWalking()">Continue Walking ➜</button>
      </div>
    </section>

    <section id="islandMap" class="hidden">
      <div class="card">
        <h2>🗺️ Flame Cay Map</h2>
        <p id="mapTimeText">☀️ Day 1 — Morning</p>
        <p id="mapActionText">Choose one activity for this time period.</p>

        <button onclick="startWalking('volcano')">🌋 Volcano Peak</button>
        <button onclick="startWalking('jungle')">🌿 Whispering Jungle</button>
        <button onclick="startWalking('shrine')">💎 Crystal Shrine</button>
        <button onclick="startWalking('beach')">🏖 Arrival Beach</button>
        <button onclick="startWalking('villa')">🏡 Main Villa</button>
        <button onclick="startWalking('gym')">💪 Gym</button>
        <button onclick="startWalking('kitchen')">🍳 Kitchen</button>
        <button onclick="startWalking('pool')">🏊 Infinity Pool</button>
        <button onclick="startWalking('firepit')">🔥 Fire Pit</button>
        <button onclick="startWalking('cove')">🌙 Moonlight Cove</button>

        <button id="advanceTimeButton" onclick="advanceTime()">
          ⏰ Skip This Time Period
        </button>
      </div>
    </section>

    <div class="card" id="relationshipBox"></div>
  </section>

</main>

<script>
let playerName = "Player";
let dialogueIndex = 0;
let typingTimer = null;

let pendingLocation = "";
let currentLocation = "villa";

let currentDay = 1;
let currentTime = "Morning";
let actionUsed = false;
let eveningEventDone = false;

let relationships = {
  lucas: 0,
  maya: 0,
  kai: 0,
  isabella: 0,
  ethan: 0,
  sofia: 0,
  noah: 0,
  lisa: 0
};

const characters = {
  narrator: {
    name: "Narrator",
    title: "The Story Begins",
    emoji: "🌴",
    image: ""
  },

  host: {
    name: "The Host",
    title: "Guardian of the Crystal Flame",
    emoji: "🎭",
    image: "images/F6AE1DF3-3320-4AD5-8141-6DD1929995FD.png"
  },

  lucas: {
    name: "Lucas Ramirez",
    title: "The Loyal Swimmer",
    emoji: "🏊",
    image: "images/AF6CC476-58A0-42B0-8044-66A742190789.png"
  },

  maya: {
    name: "Maya Patel",
    title: "The Explorer",
    emoji: "🌿",
    image: "images/0487E1B8-561B-4FDC-BAAE-EE223F61D754.png"
  },

  kai: {
    name: "Kai Nakamura",
    title: "The Competitive Surfer",
    emoji: "🌊",
    image: "images/95C98E8C-8531-42AE-BAF7-DCB8A894E394.png"
  },

  isabella: {
    name: "Isabella Cruz",
    title: "The Social Butterfly",
    emoji: "🦋",
    image: "images/95F834E8-3ABC-4C2F-AF14-E8D121253968.png"
  },

  ethan: {
    name: "Ethan Brooks",
    title: "The CEO",
    emoji: "💼",
    image: "images/E607EF85-171E-4623-9D56-921695CE2F73.png"
  },

  sofia: {
    name: "Sofia Rossi",
    title: "The Heartbreaker",
    emoji: "🌹",
    image: "images/286EA103-FC31-41AF-BD1E-3E55D7B2115F.png"
  },

  noah: {
    name: "Noah Carter",
    title: "The Firefighter",
    emoji: "🚒",
    image: "images/3C17246B-AD38-420C-8767-F53B7F3FBDDE.png"
  },

  lisa: {
    name: "Lisa Morgan",
    title: "The Bombshell",
    emoji: "💖",
    image: "images/9DBF1984-9450-4DAF-94D3-04E305D0E5DF.png"
  }
};

const introDialogue = [
  {
    speaker: "narrator",
    background: "arrival",
    text: "🔥 THE ISLAND OF FLAMES\n\nSeason 1\nEpisode 1 — The Arrival"
  },
  {
    speaker: "narrator",
    background: "arrival",
    text: "The sun rises over the ocean.\n\nYour boat moves toward Flame Cay."
  },
  {
    speaker: "host",
    background: "arrival",
    text: "Welcome... to The Island of Flames.\n\nTwenty singles.\n\nOne island.\n\nOne unforgettable summer."
  },
  {
    speaker: "lucas",
    background: "villa",
    text: "Hey!\n\nI'm Lucas.\n\nWelcome to Flame Cay."
  },
  {
    speaker: "kai",
    background: "villa",
    text: "Kai flashes a confident smile.\n\n\"I'm Kai. I came here to win... and maybe fall in love along the way.\""
  },
  {
    speaker: "isabella",
    background: "villa",
    text: "Isabella walks in with a bright smile.\n\n\"Hey! I'm Isabella. I came here for good vibes, great people... and maybe something real.\""
  },
  {
    speaker: "ethan",
    background: "villa",
    text: "I'm Ethan Brooks.\n\nI don't chase attention...\n\nI earn respect."
  },
  {
    speaker: "sofia",
    background: "villa",
    text: "Hi... I'm Sofia.\n\nI'm here to find something real."
  },
  {
    speaker: "noah",
    background: "villa",
    text: "Noah gives you a warm smile.\n\n\"I'm Noah. I don't back down from danger... but finding love might be my toughest challenge yet.\""
  },
  {
    speaker: "lisa",
    background: "villa",
    text: "Lisa walks into the villa with a confident smile.\n\n\"I'm Lisa. I'm here to find love... and maybe steal a few hearts along the way.\""
  },
  {
    speaker: "maya",
    background: "villa",
    text: "I'm Maya.\n\nThere's something strange about this island..."
  },
  {
    speaker: "narrator",
    background: "crystal",
    text: "Deep inside the jungle...\n\nThe Crystal Flame begins to glow."
  },
  {
    speaker: "narrator",
    background: "villa",
    text: "Your first day begins now.\n\nChoose one main activity during each part of the day."
  }
];

const locationNames = {
  volcano: "Volcano Peak",
  jungle: "Whispering Jungle",
  shrine: "Crystal Shrine",
  beach: "Arrival Beach",
  villa: "Main Villa",
  gym: "Gym",
  kitchen: "Kitchen",
  pool: "Infinity Pool",
  firepit: "Fire Pit",
  cove: "Moonlight Cove"
};

function startGame(){
  const input = document.getElementById("playerName");

  if(input.value.trim() !== ""){
    playerName = input.value.trim();
  }

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  document.getElementById("welcome").innerHTML =
    "Welcome to Flame Cay, " + playerName + "!";

  dialogueIndex = 0;
  pendingLocation = "";
  currentLocation = "villa";

  currentDay = 1;
  currentTime = "Morning";
  actionUsed = false;
  eveningEventDone = false;

  document.getElementById("continueButton").style.display = "block";
  document.getElementById("choices").classList.add("hidden");
  document.getElementById("islandMap").classList.add("hidden");
  document.getElementById("walkingScreen").classList.add("hidden");

  showScene(introDialogue[0]);
  updateTimeDisplay();
  updateRelationships();
}

function nextDialogue(){
  dialogueIndex++;

  if(dialogueIndex < introDialogue.length){
    showScene(introDialogue[dialogueIndex]);
  }else{
    document.getElementById("continueButton").style.display = "none";
    openIslandMap();
  }
}

function showScene(scene){
  const character = characters[scene.speaker];

  changeBackground(scene.background);

  document.getElementById("dialogueCard").classList.remove("hidden");

  const portraitBox = document.getElementById("portraitBox");
  portraitBox.classList.remove("hidden");
  portraitBox.style.animation = "none";
  portraitBox.offsetHeight;
  portraitBox.style.animation = "characterEnter .6s ease";

  document.getElementById("speakerName").innerHTML = character.name;
  document.getElementById("speakerTitle").innerHTML = character.title;

  const portraitImage = document.getElementById("portraitImage");
  const portraitEmoji = document.getElementById("portrait");

  if(character.image !== ""){
    portraitImage.src = character.image;
    portraitImage.style.display = "block";
    portraitEmoji.style.display = "none";
  }else{
    portraitImage.style.display = "none";
    portraitEmoji.style.display = "flex";
    portraitEmoji.innerHTML = character.emoji;
  }

  typeText(scene.text);
}

function changeBackground(scene){
  if(scene === "arrival"){
    document.body.style.background =
      "linear-gradient(180deg,#70d8ff,#08657e)";
  }

  if(scene === "villa"){
    document.body.style.background =
      "linear-gradient(180deg,#58c7e8,#0b718c)";
  }

  if(scene === "beach"){
    document.body.style.background =
      "linear-gradient(180deg,#7ee8ff,#167c99)";
  }

  if(scene === "crystal"){
    document.body.style.background =
      "linear-gradient(180deg,#1b335f,#061322)";
  }

  if(scene === "jungle"){
    document.body.style.background =
      "linear-gradient(180deg,#3d8b55,#153f2b)";
  }

  if(scene === "volcano"){
    document.body.style.background =
      "linear-gradient(180deg,#7f3b2f,#25100d)";
  }

  if(scene === "afternoon"){
    document.body.style.background =
      "linear-gradient(180deg,#ffbf69,#267b91)";
  }

  if(scene === "night"){
    document.body.style.background =
      "linear-gradient(180deg,#182650,#050812)";
  }
}

function typeText(text){
  const story = document.getElementById("story");

  if(typingTimer){
    clearTimeout(typingTimer);
  }

  story.innerHTML = "";
  let i = 0;

  function type(){
    if(i < text.length){
      const char = text.charAt(i);
      story.innerHTML += char === "\n" ? "<br>" : char;
      i++;
      typingTimer = setTimeout(type, 30);
    }
  }

  type();
}

function openIslandMap(){
  document.getElementById("choices").classList.add("hidden");
  document.getElementById("walkingScreen").classList.add("hidden");
  document.getElementById("dialogueCard").classList.add("hidden");
  document.getElementById("portraitBox").classList.add("hidden");
  document.getElementById("islandMap").classList.remove("hidden");

  document.getElementById("mapTimeText").innerHTML =
    getTimeIcon() + " Day " + currentDay + " — " + currentTime;

  if(actionUsed){
    document.getElementById("mapActionText").innerHTML =
      "✅ Your activity for this time period is complete.";

    document.getElementById("advanceTimeButton").innerHTML =
      getAdvanceButtonText();
  }else{
    document.getElementById("mapActionText").innerHTML =
      "Choose one main activity for this time period.";

    document.getElementById("advanceTimeButton").innerHTML =
      "⏰ Skip This Time Period";
  }
}

function updateTimeDisplay(){
  document.getElementById("dayNumber").innerHTML = currentDay;
  document.getElementById("timePeriod").innerHTML = currentTime;
  document.getElementById("timeIcon").innerHTML = getTimeIcon();
  updateActionStatus();
}

function getTimeIcon(){
  if(currentTime === "Morning"){
    return "☀️";
  }

  if(currentTime === "Afternoon"){
    return "🌤️";
  }

  return "🌙";
}

function getAdvanceButtonText(){
  if(currentTime === "Morning"){
    return "⏰ Continue to Afternoon";
  }

  if(currentTime === "Afternoon"){
    return "⏰ Continue to Evening";
  }

  return "🔥 Go to the Fire Pit";
}

function updateActionStatus(){
  const status = document.getElementById("actionStatus");

  if(actionUsed){
    status.innerHTML = "✅ Activity complete";
  }else{
    status.innerHTML = "⭐ One activity available";
  }
}

function completeAction(){
  actionUsed = true;
  updateActionStatus();
}

function actionAlreadyUsed(){
  if(!actionUsed){
    return false;
  }

  showScene({
    speaker: "narrator",
    background: getCurrentBackground(),
    text:
      "You already completed your main activity for this time period.\n\n" +
      "Return to the map and advance time to continue."
  });

  document.getElementById("choices").classList.remove("hidden");

  document.getElementById("choices").innerHTML = `
    <button onclick="openIslandMap()">
      🗺️ Return to Map
    </button>
  `;

  return true;
}

function getCurrentBackground(){
  if(currentTime === "Evening"){
    return "night";
  }

  if(currentTime === "Afternoon"){
    return "afternoon";
  }

  return "villa";
}

function advanceTime(){
  if(currentTime === "Morning"){
    currentTime = "Afternoon";
  }else if(currentTime === "Afternoon"){
    currentTime = "Evening";
  }else{
    visitFirePit();
    return;
  }

  actionUsed = false;
  eveningEventDone = false;

  updateTimeDisplay();

  document.getElementById("islandMap").classList.add("hidden");
  document.getElementById("choices").classList.remove("hidden");
  document.getElementById("dialogueCard").classList.remove("hidden");

  if(currentTime === "Afternoon"){
    showScene({
      speaker: "narrator",
      background: "afternoon",
      text:
        "The morning slowly fades into afternoon.\n\n" +
        "The Islanders move to new locations.\n\n" +
        "📅 Day " + currentDay +
        "\n🌤️ Afternoon\n\n" +
        "⭐ One new activity is available."
    });
  }

  if(currentTime === "Evening"){
    showScene({
      speaker: "narrator",
      background: "night",
      text:
        "The sun disappears beyond the ocean.\n\n" +
        "Lanterns glow across Flame Cay as evening begins.\n\n" +
        "📅 Day " + currentDay +
        "\n🌙 Evening\n\n" +
        "The Islanders will gather at the Fire Pit tonight."
    });
  }

  document.getElementById("choices").innerHTML = `
    <button onclick="openIslandMap()">
      🗺️ Return to Map
    </button>
  `;
}

function startWalking(location){
  pendingLocation = location;

  const destination =
    locationNames[location] || "your destination";

  document.getElementById("islandMap").classList.add("hidden");
  document.getElementById("choices").classList.add("hidden");
  document.getElementById("dialogueCard").classList.add("hidden");
  document.getElementById("portraitBox").classList.add("hidden");
  document.getElementById("walkingScreen").classList.remove("hidden");

  document.getElementById("walkingTitle").innerHTML =
    "🚶 Walking to " + destination;

  document.getElementById("walkingText").innerHTML =
    getWalkingText(currentLocation, location);
}

function getWalkingText(from, to){
  if(from === "villa" && to === "beach"){
    return "You leave the villa and follow a stone path between the palms.<br><br>The sound of the ocean grows louder as Arrival Beach comes into view.";
  }

  if(from === "villa" && to === "shrine"){
    return "You leave the bright villa behind and follow Maya's trail into the jungle.<br><br>The air becomes cooler as the Crystal Shrine appears between the trees.";
  }

  if(from === "beach" && to === "villa"){
    return "You leave the shoreline and follow the sandy path uphill.<br><br>The Main Villa shines in the distance beneath the tropical sun.";
  }

  if(to === "jungle"){
    return "You follow a narrow trail beneath thick green leaves.<br><br>Soft whispers seem to move through the trees around you.";
  }

  if(to === "volcano"){
    return "You begin climbing the rocky path toward Volcano Peak.<br><br>Warm air rises from the ground beneath your feet.";
  }

  if(to === "firepit"){
    return "You follow glowing lanterns through the darkening villa grounds.<br><br>The Fire Pit burns brightly ahead.";
  }

  if(to === "cove"){
    return "You follow a quiet moonlit path beside the ocean.<br><br>Moonlight Cove appears beyond the palms.";
  }

  return "You leave " +
    (locationNames[from] || "your current location") +
    " and follow the island path toward " +
    (locationNames[to] || "your destination") +
    ".<br><br>The scenery slowly changes around you.";
}

function finishWalking(){
  document.getElementById("walkingScreen").classList.add("hidden");

  if(pendingLocation !== ""){
    currentLocation = pendingLocation;
    visitLocation(pendingLocation);
    pendingLocation = "";
  }
}

function visitLocation(location){
  document.getElementById("islandMap").classList.add("hidden");
  document.getElementById("dialogueCard").classList.remove("hidden");
  document.getElementById("choices").classList.remove("hidden");

  if(location === "beach"){
    visitBeach();
  }else if(location === "villa"){
    visitVilla();
  }else if(location === "shrine"){
    visitShrine();
  }else if(location === "jungle"){
    visitJungle();
  }else if(location === "gym"){
    visitGym();
  }else if(location === "kitchen"){
    visitKitchen();
  }else if(location === "pool"){
    visitPool();
  }else if(location === "firepit"){
    visitFirePit();
  }else if(location === "cove"){
    visitCove();
  }else{
    showEmptyLocation(
      "🌋 Volcano Peak",
      "The path farther up the volcano is currently locked.",
      "volcano"
    );
  }
}

function visitBeach(){
  if(currentTime === "Morning"){
    showScene({
      speaker: "narrator",
      background: "beach",
      text:
        "Morning sunlight shines across Arrival Beach.\n\n" +
        "Kai stands near the waves while Lisa relaxes in the sun."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkKaiBeach()">🌊 Talk to Kai</button>
      <button onclick="talkLisaBeach()">💖 Talk to Lisa</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  if(currentTime === "Afternoon"){
    showScene({
      speaker: "narrator",
      background: "afternoon",
      text:
        "The afternoon sun glows over Arrival Beach.\n\n" +
        "Sofia is walking alone near the shoreline."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkSofiaBeach()">🌹 Talk to Sofia</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  showEmptyLocation(
    "🏖 Arrival Beach",
    "The beach is quiet this evening. Everyone has gone to the Fire Pit.",
    "night"
  );
}

function visitVilla(){
  if(currentTime === "Morning"){
    showScene({
      speaker: "narrator",
      background: "villa",
      text:
        "The Main Villa is bright and peaceful this morning.\n\n" +
        "Lucas and Ethan are talking in the lounge."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkLucasVilla()">🏊 Talk to Lucas</button>
      <button onclick="talkEthanVilla()">💼 Talk to Ethan</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  if(currentTime === "Afternoon"){
    showScene({
      speaker: "narrator",
      background: "afternoon",
      text:
        "The villa feels quieter during the afternoon.\n\n" +
        "Ethan is sitting alone near the lounge windows."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkEthanVilla()">💼 Talk to Ethan</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  showEmptyLocation(
    "🏡 Main Villa",
    "The villa is almost empty. Everyone is gathering at the Fire Pit.",
    "night"
  );
}

function visitShrine(){
  showScene({
    speaker: "maya",
    background: "crystal",
    text:
      currentTime === "Evening"
        ? "Maya stands inside the glowing shrine.\n\n\"The Flame is stronger tonight,\" she whispers."
        : "Maya studies the glowing symbols carved into the shrine.\n\n\"These markings keep changing,\" she says."
  });

  document.getElementById("choices").innerHTML = `
    <button onclick="talkMayaShrine()">🌿 Talk to Maya</button>
    <button onclick="examineCrystal()">🔥 Examine the Crystal Flame</button>
    <button onclick="openIslandMap()">⬅ Back to Map</button>
  `;
}

function visitJungle(){
  if(currentTime === "Morning" || currentTime === "Afternoon"){
    showScene({
      speaker: "maya",
      background: "jungle",
      text:
        "You find Maya following a narrow trail through the jungle.\n\n" +
        "\"I heard something moving near the old ruins,\" she says."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkMayaJungle()">🌿 Explore with Maya</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  showEmptyLocation(
    "🌿 Whispering Jungle",
    "The jungle is too dark to explore safely tonight.",
    "night"
  );
}

function visitGym(){
  if(currentTime === "Morning" || currentTime === "Afternoon"){
    showScene({
      speaker: "noah",
      background: currentTime === "Afternoon" ? "afternoon" : "villa",
      text:
        "Noah is finishing a workout in the gym.\n\n" +
        "\"You joining me, or just watching?\" he asks with a smile."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkNoahGym()">🚒 Talk to Noah</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  showEmptyLocation(
    "💪 Gym",
    "The gym is empty for the evening.",
    "night"
  );
}

function visitKitchen(){
  if(currentTime === "Morning"){
    showScene({
      speaker: "sofia",
      background: "villa",
      text:
        "Sofia is preparing fruit and coffee in the kitchen.\n\n" +
        "\"Morning,\" she says with a warm smile."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkSofiaKitchen()">🌹 Talk to Sofia</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  showEmptyLocation(
    "🍳 Kitchen",
    "Nobody is spending time in the kitchen right now.",
    currentTime === "Evening" ? "night" : "villa"
  );
}

function visitPool(){
  if(currentTime === "Afternoon"){
    showScene({
      speaker: "narrator",
      background: "afternoon",
      text:
        "Music plays beside the Infinity Pool.\n\n" +
        "Kai and Isabella are enjoying the afternoon sun."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkKaiPool()">🌊 Talk to Kai</button>
      <button onclick="talkIsabellaPool()">🦋 Talk to Isabella</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  showEmptyLocation(
    "🏊 Infinity Pool",
    "The pool area is quiet right now.",
    currentTime === "Evening" ? "night" : "beach"
  );
}

function visitFirePit(){
  if(currentTime === "Afternoon"){
    showScene({
      speaker: "lucas",
      background: "afternoon",
      text:
        "Lucas sits beside the unlit Fire Pit, lost in thought.\n\n" +
        "\"I needed somewhere quiet,\" he says."
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="talkLucasFirePit()">🏊 Talk to Lucas</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  if(currentTime === "Evening"){
    showScene({
      speaker: "host",
      background: "night",
      text:
        "Every Islander gathers around the glowing Fire Pit.\n\n" +
        "The Host steps into the light.\n\n" +
        "\"Tonight, the Crystal Flame will begin its first test.\""
    });

    document.getElementById("choices").innerHTML = `
      <button onclick="firePitEvent()">🔥 Begin the Evening Event</button>
      <button onclick="openIslandMap()">⬅ Back to Map</button>
    `;
    return;
  }

  showEmptyLocation(
    "🔥 Fire Pit",
    "The Fire Pit is empty this morning.",
    "villa"
  );
}

    "🌙 Moonlight Cove",
    currentTime === "Evening"
      ? "The cove glows beneath the moon, but everyone is at the Fire Pit."
      : "The cove is peaceful, but nobody is here this morning.",
    currentTime === "Evening" ? "night" : "beach"
  );
}

function showEmptyLocation(title, description, background){
  showScene({
    speaker: "narrator",
    background: background,
    text: title + "\n\n" + description
  });

  document.getElementById("choices").innerHTML = `
    <button onclick="openIslandMap()">⬅ Back to Map</button>
  `;
}

function addRelationship(characterName, amount){
  if(actionAlreadyUsed()){
    return false;
  }

  relationships[characterName] += amount;
  completeAction();
  updateRelationships();

  return true;
}

function showCompletedActionButtons(){
  document.getElementById("choices").innerHTML = `
    <button onclick="openIslandMap()">
      🗺️ Return to Map
    </button>

    <button onclick="advanceTime()">
      ${getAdvanceButtonText()}
    </button>
  `;
}

function firePitEvent(){
  if(eveningEventDone){
    return;
  }

  eveningEventDone = true;
  actionUsed = true;
  updateActionStatus();

  showScene({
    speaker: "host",
    background: "night",
    text:
      "The Host raises one hand toward the Crystal Flame.\n\n" +
      "\"Every choice you made today has been seen.\"\n\n" +
      "\"The island will remember the connections you created.\"\n\n" +
      "\"Rest now. Tomorrow, your first true test begins.\"\n\n" +
      "✅ Evening event complete."
  });

  document.getElementById("choices").innerHTML = `
    <button onclick="endNight()">
      🌙 End the Night
    </button>
  `;
}

function endNight(){
  currentDay++;
  currentTime = "Morning";
  actionUsed = false;
  eveningEventDone = false;

  currentLocation = "villa";
  pendingLocation = "";

  updateTimeDisplay();
  updateRelationships();

  document.getElementById("islandMap").classList.add("hidden");
  document.getElementById("walkingScreen").classList.add("hidden");
  document.getElementById("choices").classList.remove("hidden");
  document.getElementById("dialogueCard").classList.remove("hidden");

  showScene({
    speaker: "narrator",
    background: "arrival",
    text:
      "Morning sunlight spreads across Flame Cay.\n\n" +
      "The Islanders begin waking inside the villa.\n\n" +
      "📅 Day " + currentDay +
      "\n☀️ Morning\n\n" +
      "⭐ One new activity is available."
  });

  document.getElementById("choices").innerHTML = `
    <button onclick="openIslandMap()">
      🗺️ Begin Day ${currentDay}
    </button>
  `;
}
