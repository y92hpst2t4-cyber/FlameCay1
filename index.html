<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Island of Flames</title>
  <link rel="stylesheet" href="style.css">
</head>

<body id="bodyBackground">
<main class="screen">

  <section id="menu">
    <h1>🔥 The Island of Flames</h1>
    <h2>Season 1 — The Crystal Awakens</h2>
    <input id="playerName" placeholder="Enter your name">
    <button onclick="startGame()">▶ New Game</button>
  </section>

  <section id="game" class="hidden">
    <h2 id="welcome">Welcome to Flame Cay</h2>

    <div id="portraitBox" class="hidden">
      <img id="portraitImage" src="" alt="Character Portrait">
      <div id="portrait">🌴</div>
      <h3 id="speakerName">Narrator</h3>
      <p id="speakerTitle">The Story Begins</p>
    </div>

    <div class="card">
      <p id="story"></p>
      <button id="continueButton" onclick="nextDialogue()">▶ Continue</button>
    </div>

    <div id="choices" class="hidden">
      <button onclick="showBeachChoices()">🏖 Beach</button>
      <button onclick="showVillaChoices()">🏡 Villa Lounge</button>
      <button onclick="showShrineChoices()">💎 Crystal Shrine</button>
    </div>

    <div class="card" id="relationshipBox"></div>
  </section>

</main>

<script>
let playerName = "Player";
let dialogueIndex = 0;
let typingTimer = null;

let relationships = {
  lucas: 0,
  maya: 0,
  kai: 0,
  isabella: 0,
  ethan: 0,
  sofia: 0,
  noah: 0,
  lisa: 0
};

const characters = {
  narrator: {
    name: "Narrator",
    title: "The Story Begins",
    emoji: "🌴",
    image: ""
  },

  host: {
    name: "The Host",
    title: "Guardian of the Crystal Flame",
    emoji: "🎭",
    image: "images/F6AE1DF3-3320-4AD5-8141-6DD1929995FD.png"
  },

  lucas: {
    name: "Lucas Ramirez",
    title: "The Loyal Swimmer",
    emoji: "👦",
    image: "images/AF6CC476-58A0-42B0-8044-66A742190789.png"
  },

  kai: {
    name: "Kai Nakamura",
    title: "The Competitive Surfer",
    emoji: "🌊",
    image: "images/95C98E8C-8531-42AE-BAF7-DCB8A894E394.png"
  },

  isabella: {
    name: "Isabella Cruz",
    title: "The Social Butterfly",
    emoji: "🦋",
    image: "images/95F834E8-3ABC-4C2F-AF14-E8D121253968.png"
  },

  ethan: {
    name: "Ethan Brooks",
    title: "The CEO",
    emoji: "💼",
    image: "images/E607EF85-171E-4623-9D56-921695CE2F73.png"
  },

  sofia: {
    name: "Sofia Rossi",
    title: "The Heartbreaker",
    emoji: "💖",
    image: "images/286EA103-FC31-41AF-BD1E-3E55D7B2115F.png"
  },

  noah: {
    name: "Noah Carter",
    title: "The Firefighter",
    emoji: "🚒",
    image: "images/3C17246B-AD38-420C-8767-F53B7F3FBDDE.png"
  },

  lisa: {
    name: "Lisa Morgan",
    title: "The Bombshell",
    emoji: "💖",
    image: "images/9DBF1984-9450-4DAF-94D3-04E305D0E5DF.png"
  },

  maya: {
    name: "Maya Patel",
    title: "The Explorer",
    emoji: "🌿",
    image: "images/0487E1B8-561B-4FDC-BAAE-EE223F61D754.png"
  }
};

const introDialogue = [
  { speaker:"narrator", background:"arrival", text:"🔥 THE ISLAND OF FLAMES\n\nSeason 1\nEpisode 1 — The Arrival" },
  { speaker:"narrator", background:"arrival", text:"The sun rises over the ocean.\n\nYour boat moves toward Flame Cay." },
  { speaker:"host", background:"arrival", text:"Welcome... to The Island of Flames.\n\nTwenty singles. One island. One unforgettable summer." },
  { speaker:"lucas", background:"villa", text:"Hey!\n\nI'm Lucas. Welcome to Flame Cay." },
  { speaker:"kai", background:"villa", text:"Kai flashes a confident smile.\n\n\"I'm Kai. I came here to win... and maybe fall in love along the way.\"" },
  { speaker:"isabella", background:"villa", text:"Isabella walks in with a bright smile.\n\n\"Hey! I'm Isabella. I came here for good vibes, great people... and maybe something real.\"" },
  { speaker:"ethan", background:"villa", text:"I'm Ethan Brooks.\n\nI don't chase attention...\n\nI earn respect." },
  { speaker:"sofia", background:"villa", text:"Hi... I'm Sofia.\n\nI'm here to find something real." },
  { speaker:"noah", background:"villa", text:"Noah gives you a warm smile.\n\n\"I'm Noah. I don't back down from danger...\n\nbut finding love might be my toughest challenge yet.\"" },
  { speaker:"lisa", background:"villa", text:"Lisa walks into the villa with a confident smile.\n\n\"I'm Lisa.\n\nI'm here to find love... and maybe steal a few hearts along the way.\"" },
  { speaker:"maya", background:"villa", text:"I'm Maya.\n\nThere's something strange about this island..." },
  { speaker:"narrator", background:"crystal", text:"Deep inside the jungle...\n\nThe Crystal Flame begins to glow." },
  { speaker:"narrator", background:"villa", text:"Your first day begins now.\n\nWhere do you want to explore?" }
];

function startGame(){
  const input = document.getElementById("playerName");

  if(input.value.trim() !== ""){
    playerName = input.value.trim();
  }

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  document.getElementById("welcome").innerHTML =
    "Welcome to Flame Cay, " + playerName + "!";

  dialogueIndex = 0;
  document.getElementById("continueButton").style.display = "block";
  document.getElementById("choices").classList.add("hidden");

  showScene(introDialogue[0]);
  updateRelationships();
}

function nextDialogue(){
  dialogueIndex++;

  if(dialogueIndex < introDialogue.length){
    showScene(introDialogue[dialogueIndex]);
  }else{
    document.getElementById("continueButton").style.display = "none";
    showLocationChoices();
  }
}

function showScene(scene){
  const character = characters[scene.speaker];

  changeBackground(scene.background);

  const portraitBox = document.getElementById("portraitBox");
  portraitBox.classList.remove("hidden");

  portraitBox.style.animation = "none";
  portraitBox.offsetHeight;
  portraitBox.style.animation = "characterEnter .6s ease";

  document.getElementById("speakerName").innerHTML = character.name;
  document.getElementById("speakerTitle").innerHTML = character.title;

  const portraitImage = document.getElementById("portraitImage");
  const portraitEmoji = document.getElementById("portrait");

  if(character.image !== ""){
    portraitImage.src = character.image;
    portraitImage.style.display = "block";
    portraitEmoji.style.display = "none";
  }else{
    portraitImage.style.display = "none";
    portraitEmoji.style.display = "flex";
    portraitEmoji.innerHTML = character.emoji;
  }

  typeText(scene.text);
}

function changeBackground(scene){
  if(scene === "arrival"){
    document.body.style.background = "linear-gradient(180deg,#70d8ff,#08657e)";
  }

  if(scene === "villa"){
    document.body.style.background = "linear-gradient(180deg,#58c7e8,#0b718c)";
  }

  if(scene === "beach"){
    document.body.style.background = "linear-gradient(180deg,#7ee8ff,#167c99)";
  }

  if(scene === "crystal"){
    document.body.style.background = "linear-gradient(180deg,#1b335f,#061322)";
  }
}

function typeText(text){
  const story = document.getElementById("story");

  if(typingTimer){
    clearTimeout(typingTimer);
  }

  story.innerHTML = "";

  let i = 0;

  function type(){
    if(i < text.length){
      const char = text.charAt(i);
      story.innerHTML += char === "\n" ? "<br>" : char;
      i++;
      typingTimer = setTimeout(type, 30);
    }
  }

  type();
}

function showLocationChoices(){
  const choices = document.getElementById("choices");

  choices.classList.remove("hidden");
  choices.innerHTML = `
    <button onclick="showBeachChoices()">🏖 Beach</button>
    <button onclick="showVillaChoices()">🏡 Villa Lounge</button>
    <button onclick="showShrineChoices()">💎 Crystal Shrine</button>
  `;
}

function showBeachChoices(){
  changeBackground("beach");

  showScene({
    speaker:"narrator",
    background:"beach",
    text:"You walk down to the beach.\n\nKai stands near the waves while Lisa relaxes in the sun.\n\nWho do you want to spend time with?"
  });

  document.getElementById("choices").innerHTML = `
    <button onclick="talkKaiBeach()">🌊 Talk to Kai</button>
    <button onclick="talkLisaBeach()">💖 Talk to Lisa</button>
    <button onclick="showLocationChoices()">⬅ Back to Locations</button>
  `;
}

function showVillaChoices(){
  changeBackground("villa");

  showScene({
    speaker:"narrator",
    background:"villa",
    text:"You enter the villa lounge.\n\nLucas, Ethan, and Sofia are gathered near the couches.\n\nWho do you want to talk to?"
  });

  document.getElementById("choices").innerHTML = `
    <button onclick="talkLucasVilla()">🏊 Talk to Lucas</button>
    <button onclick="talkEthanVilla()">💼 Talk to Ethan</button>
    <button onclick="talkSofiaVilla()">🌹 Talk to Sofia</button>
    <button onclick="showLocationChoices()">⬅ Back to Locations</button>
  `;
}

function showShrineChoices(){
  changeBackground("crystal");

  showScene({
    speaker:"narrator",
    background:"crystal",
    text:"You follow the path toward the Crystal Shrine.\n\nMaya is studying glowing symbols carved into ancient stone.\n\nThe air feels strange here."
  });

  document.getElementById("choices").innerHTML = `
    <button onclick="talkMayaShrine()">🌿 Follow Maya</button>
    <button onclick="examineCrystal()">🔥 Examine the Crystal Flame</button>
    <button onclick="showLocationChoices()">⬅ Back to Locations</button>
  `;
}

function talkKaiBeach(){
  relationships.kai++;

  showScene({
    speaker:"kai",
    background:"beach",
    text:"Kai smiles as the waves crash behind him.\n\n\"You came to the right place,\" he says.\n\n\"The ocean knows when people are being real.\"\n\n❤️ Kai +1"
  });

  updateRelationships();
}

function talkLisaBeach(){
  relationships.lisa++;

  showScene({
    speaker:"lisa",
    background:"beach",
    text:"Lisa tilts her head and gives you a playful smile.\n\n\"I was wondering when you'd come talk to me.\"\n\nHer confidence is impossible to ignore.\n\n❤️ Lisa +1"
  });

  updateRelationships();
}

function talkLucasVilla(){
  relationships.lucas++;

  showScene({
    speaker:"lucas",
    background:"villa",
    text:"Lucas looks up when you sit beside him.\n\n\"I'm glad you're here,\" he says softly.\n\n\"This place feels intense, but you make it easier.\"\n\n❤️ Lucas +1"
  });

  updateRelationships();
}

function talkEthanVilla(){
  relationships.ethan++;

  showScene({
    speaker:"ethan",
    background:"villa",
    text:"Ethan studies you with a calm smile.\n\n\"Most people talk too much on day one,\" he says.\n\n\"You seem like someone who actually listens.\"\n\n❤️ Ethan +1"
  });

  updateRelationships();
}

function talkSofiaVilla(){
  relationships.sofia++;

  showScene({
    speaker:"sofia",
    background:"villa",
    text:"Sofia smiles warmly as you approach.\n\n\"I was hoping someone honest would come over.\"\n\nFor a moment, her confident mask softens.\n\n❤️ Sofia +1"
  });

  updateRelationships();
}

function talkMayaShrine(){
  relationships.maya++;

  showScene({
    speaker:"maya",
    background:"crystal",
    text:"Maya points to the glowing symbols.\n\n\"These markings are older than the villa,\" she whispers.\n\n\"And I think they were waiting for you.\"\n\n❤️ Maya +1"
  });

  updateRelationships();
}

function examineCrystal(){
  showScene({
    speaker:"narrator",
    background:"crystal",
    text:"You step closer to the Crystal Flame.\n\nThe light pulses once.\n\nA whisper moves through the air:\n\n\"Keeper...\"\n\nSomething about the island has noticed you."
  });
}

function updateRelationships(){
  document.getElementById("relationshipBox").innerHTML =
    "❤️ Lucas: " + relationships.lucas +
    "<br>❤️ Maya: " + relationships.maya +
    "<br>❤️ Kai: " + relationships.kai +
    "<br>❤️ Isabella: " + relationships.isabella +
    "<br>❤️ Ethan: " + relationships.ethan +
    "<br>❤️ Sofia: " + relationships.sofia +
    "<br>❤️ Noah: " + relationships.noah +
    "<br>❤️ Lisa: " + relationships.lisa;
}
</script>

</body>
</html>
