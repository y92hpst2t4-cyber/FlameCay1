<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Island of Flames</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="bodyBackground">

<main class="screen">

    <!-- ========================= -->
    <!-- MAIN MENU -->
    <!-- ========================= -->

    <section id="menu">

        <h1>🔥 The Island of Flames</h1>
        <h2>Season 1 — The Crystal Awakens</h2>

        <input
            id="playerName"
            placeholder="Enter your name">

        <button onclick="startGame()">
            ▶ New Game
        </button>

    </section>

    <!-- ========================= -->
    <!-- GAME -->
    <!-- ========================= -->

    <section id="game" class="hidden">

        <!-- Top Bar -->

        <div id="topBar">

            <button>☰</button>

            <button>💾</button>

            <button>⚙️</button>

        </div>

        <!-- Welcome -->

        <h2 id="welcome">
            Welcome to Flame Cay
        </h2>

        <!-- Portrait -->

        <div id="portraitBox" class="hidden">

            <img
                id="portraitImage"
                src=""
                alt="Portrait"
                style="display:none;">

            <div id="portrait">
                🌴
            </div>

            <h3 id="speakerName">
                Narrator
            </h3>

            <p id="speakerTitle">
                The Story Begins
            </p>

        </div>

        <!-- Dialogue -->

        <div class="card">

            <p id="story"></p>

            <button
                id="continueButton"
                onclick="nextDialogue()">
                ▶ Continue
            </button>

        </div>

        <!-- Choices -->

        <div
            id="choices"
            class="hidden">

            <button onclick="goToVilla()">
                🏡 Enter the Villa
            </button>

            <button onclick="meetMaya()">
                🌿 Talk to Maya
            </button>

            <button onclick="crystalRoute()">
                🔥 Look toward the Crystal Flame
            </button>

        </div>

        <!-- Relationships -->

        <div
            class="card"
            id="relationshipBox">

            ❤️ Lucas: 0

            <br>

            ❤️ Maya: 0

        </div>

    </section>

</main>

<script src="script.js"></script>

</body>

</html>
